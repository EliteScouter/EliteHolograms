modLoader="javafml"
loaderVersion="[4,)"
license="${mod_license}"
issueTrackerURL="https://strictgaming.com/support"
showAsResourcePack=false

[[mods]]
  modId="${mod_id}"
  version="${mod_version}"
  displayName="${mod_name}"
  displayURL="https://strictgaming.com"
  credits="StrictGaming"
  authors="EliteScouter"
  description='''
  A powerful hologram mod for Minecraft NeoForge
  '''

  [[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

  [[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
